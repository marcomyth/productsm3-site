name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /root/productsm3-site
            # git fetch + reset --hard em vez de git pull: garante sincronia
            # exata com origin/main mesmo se há mudanças locais não-commitadas
            # (npm install costuma modificar package-lock.json e bloquearia pull silenciosamente).
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            # Next standalone NAO copia public/ e .next/static/ automaticamente —
            # o server.js procura eles ao lado dele. Sem isso, CSS e public
            # assets ficam 404 no site.
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/
            pm2 restart productsm3-site
